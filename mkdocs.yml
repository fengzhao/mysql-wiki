      - "13. MySQL 表管理": 01-mysql-basics/13-how-mysql-opens-and-closes-tables.md
      - "14. MySQL 数据字典": 01-mysql-basics/14-mysql-meta-data.md
      - "15. MySQL 数据文件格式": 01-mysql-basics/15-data-file-formats.md
      - "16. MySQL 分区表": 01-mysql-basics/16-mysql-partitioned-table.md

site_name: MySQL WIKI
site_description: "MySQL WIKI - MySQL 技术文档与学习资源"
site_author: "fengzhao"
site_url: "https://mysql.fengzhao.pro"

# 生成干净的 URL（不带 .html 后缀）
use_directory_urls: true

# Repository
repo_name: "fengzhao/mysql-wiki"
repo_url: "https://github.com/fengzhao/mysql-wiki"
edit_uri: edit/master/docs/

# Copyright
copyright: "Copyleft &copy; 2020 - 2026 fengzhao"

theme:
  name: material
  language: "zh"
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.path
    - navigation.expand
    - navigation.prune
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.action.edit
    - content.tooltips
    - content.code.select

  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: 切换到深色模式
      primary: "indigo"
      accent: "indigo"

    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: 切换到浅色模式
      primary: "indigo"
      accent: "indigo"

  font:
    text: "Roboto"
    code: "Roboto Mono"

  icon:
    edit: material/pencil
    view: material/eye

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      type: iso_datetime
  - git-authors

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.magiclink
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - footnotes
  - meta
  - def_list
  - attr_list
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true


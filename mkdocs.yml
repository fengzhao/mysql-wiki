extra_css:
  - stylesheets/extra.css

extra:
  analytics:
    provider: google
    property: G-PBHN7DDDGX
    feedback:
      title: 这个页面有帮助吗？
      ratings:
        - icon: material/emoticon-happy-outline
          name: 有帮助
          data: 1
          note: 感谢你的反馈！
        - icon: material/emoticon-sad-outline
          name: 需要改进

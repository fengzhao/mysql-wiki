site_name: MySQL WIKI
site_description: "MySQL WIKI - MySQL 技术文档与学习资源"
site_author: "fengzhao"
site_url: "https://mysql.fengzhao.me"

# Repository
repo_name: "fengzhao/mysql-wiki"
repo_url: "https://github.com/fengzhao/mysql-wiki"

# Copyright
copyright: "Copyleft &copy; 2020 - 2026 fengzhao"

theme:
  name: material
  language: "zh"
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.prune
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: 切换到深色模式
      primary: "indigo"
      accent: "indigo"

    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: 切换到浅色模式
      primary: "indigo"
      accent: "indigo"

  font:
    text: "Roboto"
    code: "Roboto Mono"

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      type: iso_datetime
      enable_time_zone: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_png
  - pymdownx.magiclink
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex
  - toc:
      permalink: true
      toc_depth: 3
  - footnotes
  - meta
  - def_list

nav:
  - "首页": index.md
  - "学习资源": resources.md

  - "MySQL 入门":
      - "index": basic/index.md
      - "0. MySQL 的起源和分支": basic/0.mysql_source.md
      - "1. 数据库概述": basic/1.introduce_database.md
      - "2. 安装 MySQL": basic/2.install_mysql.md
      - "3. MySQL 可执行程序": basic/3.mysql_execute_command.md
      - "4. SQL 语句和语法": basic/4.sql.md
      - "5. 关系模型和关系代数": basic/5.relation.md
      - "6. SQL 题目练习": basic/6.sql_practice.md
      - "7. MySQL 数据类型": basic/7.MySQL 数据类型.md
      - "8. MySQL 字符集和排序规则": basic/8.MySQL 字符集和排序规则.md
      - "9. MySQL 逻辑架构": basic/9.mysql_architecture.md
      - "10. MySQL 存储引擎": basic/10.MySQL 存储引擎.md
      - "11. MySQL 事务和锁": basic/11.sql-Transaction.md
      - "12. MySQL 内存概述": basic/12.MySQL 内存概述.md
      - "13. MySQL 表管理": basic/13.MySQL 表管理.md
      - "14. MySQL 数据字典": basic/14.MySQL 数据字典.md
      - "15. MySQL 数据文件格式": basic/15.数据文件格式.md
      - "16. MySQL 分区表": basic/16.MySQL 分区表.md
      - "17. MySQL 快速导入数据": basic/17.MySQL 快速导入数据.md
      - "18. MySQL 临时表": basic/18.MySQL 临时表.md
      - "19. MySQL 不可见列": basic/19.MySQL 不可见列.md

  - "MySQL 基础":
      - "index": mysql-basic/index.md
      - "1. 索引相关": fundamental/1.MySQL 索引.md
      - "2. 数据库设计": mysql-basic/02.数据库设计.md
      - "3. 在线 DDL": mysql-basic/03.在线 DDL.md
      - "4. 联表查询": mysql-basic/04.MySQL 连表查询算法.md
      - "5. 数据导入导出": mysql-basic/05.MySQL 导库.md
      - "6. INSERT 语法": mysql-basic/06.MySQL-insert 语法.md
